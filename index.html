<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PieSano - Clínica de Podología</title>
    <!-- Frameworks -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: #f8fafc;
            color: #1e293b;
        }
        .animate-in { animation: fadeIn 0.5s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 24px;
            height: 24px;
            background: #078f99;
            cursor: pointer;
            border-radius: 50%;
            border: 4px solid white;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <!-- CONFIGURACIÓN DE FIREBASE (Brenda) -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, doc, deleteDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBsgmSB728BrmPsEFK8cW3F30vKWKp51JM",
            authDomain: "piesano-c1523.firebaseapp.com",
            projectId: "piesano-c1523",
            storageBucket: "piesano-c1523.firebasestorage.app",
            messagingSenderId: "595658381676",
            appId: "1:595658381676:web:3e233844f498726bb3fb49",
            measurementId: "G-VD12ZZGL88"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        window.fb = { auth, db, collection, addDoc, onSnapshot, doc, deleteDoc, serverTimestamp, signInAnonymously, onAuthStateChanged };
    </script>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- DEFINICIÓN DE ICONOS ---
        const Icons = {
            User: ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>,
            Stethoscope: ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M12 22v-3m0 0a8 8 0 1 0-8-8v3c0 1 1 2 2 2h12c1 0 2-1 2-2v-3a8 8 0 0 0-8-8"/></svg>,
            Calendar: ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>,
            Camera: ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M14.5 4h-5L7 7H4a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-3l-2.5-3z"/><circle cx="12" cy="13" r="3"/></svg>,
            Trash: ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></svg>,
            Shield: ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>,
            Check: ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="20 6 9 17 4 12"/></svg>,
            ChevronLeft: ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="m15 18-6-6 6-6"/></svg>,
            Loader: ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className + " animate-spin"}><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg>,
            Alert: ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>,
        };

        const App = () => {
            const [view, setView] = useState('form');
            const [user, setUser] = useState(null);
            const [step, setStep] = useState(1);
            const [submitted, setSubmitted] = useState(false);
            const [loading, setLoading] = useState(false);
            const [appointments, setAppointments] = useState([]);
            const [imagePreview, setImagePreview] = useState(null);
            const [errorMsg, setErrorMsg] = useState(null);

            const [formData, setFormData] = useState({
                nombre: '', edad: '', telefono: '', email: '', sexo: 'Femenino',
                nombreTutor: '', parentescoTutor: 'Madre', consentimientoTutor: false,
                esDiabetico: 'no', tomaAnticoagulantes: 'no', alergias: '', otrosMedicamentos: '', nivelDolor: 0,
                motivo: 'Corte de uñas básico', otroMotivoText: '', fecha: '', hora: '', 
                comoSeEntero: 'Facebook', aceptaTerminos: false
            });

            const brandColors = { darkTeal: '#1b4d4e', mint: '#88c9b3', teal: '#078f99' };

            const isMinor = formData.edad !== '' && parseInt(formData.edad) < 18;

            useEffect(() => {
                const init = async () => {
                    if (!window.fb) return;
                    try {
                        if (window.emailjs) window.emailjs.init("VYLfu8ByG-EGkt_fV");
                        await window.fb.signInAnonymously(window.fb.auth);
                        window.fb.onAuthStateChanged(window.fb.auth, setUser);
                    } catch (e) { console.error(e); setErrorMsg("Error de conexión con el servidor."); }
                };
                init();
            }, []);

            useEffect(() => {
                if (!user || view !== 'admin' || !window.fb) return;
                const colRef = window.fb.collection(window.fb.db, 'appointments');
                const unsubscribe = window.fb.onSnapshot(colRef, (snap) => {
                    const data = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                    setAppointments(data.sort((a, b) => (b.createdAt?.seconds || 0) - (a.createdAt?.seconds || 0)));
                }, (err) => { setErrorMsg("Error al leer citas."); });
                return () => unsubscribe();
            }, [user, view]);

            const handleInputChange = (e) => {
                const { name, value, type, checked } = e.target;
                setFormData(prev => ({ ...prev, [name]: type === 'checkbox' ? checked : value }));
            };

            const handleImageChange = (e) => {
                const file = e.target.files[0];
                if (file) {
                    // LÍMITE ESTRICTO: 45KB para asegurar que EmailJS lo acepte (límite total 50KB)
                    if (file.size > 45 * 1024) { 
                        setErrorMsg("⚠️ La foto es muy pesada para enviarla por correo. Por favor, selecciona una foto más pequeña, captura de pantalla o de menor calidad (Máximo 45KB)."); 
                        e.target.value = ""; // Limpiar el input
                        setImagePreview(null);
                        return; 
                    }
                    const reader = new FileReader();
                    reader.onloadend = () => { setImagePreview(reader.result); setErrorMsg(null); };
                    reader.readAsDataURL(file);
                }
            };

            const handleSubmit = async (e) => {
                e.preventDefault();
                if (!user || !formData.aceptaTerminos) return;
                setLoading(true);
                setErrorMsg(null);

                try {
                    // 1. Guardar en Base de Datos (Firestore)
                    const colRef = window.fb.collection(window.fb.db, 'appointments');
                    await window.fb.addDoc(colRef, {
                        ...formData,
                        foto: imagePreview,
                        createdAt: window.fb.serverTimestamp(),
                        uid: user.uid
                    });

                    // 2. Enviar Correo (EmailJS) - Aquí incluimos la foto
                    if (window.emailjs) {
                        await emailjs.send("service_vek85n9", "template_zidipjv", {
                            paciente_nombre: formData.nombre,
                            paciente_edad: formData.edad,
                            paciente_sexo: formData.sexo,
                            paciente_email: formData.email || "No proporcionado",
                            paciente_telefono: formData.telefono,
                            cita_fecha: formData.fecha,
                            cita_hora: formData.hora,
                            cita_motivo: formData.motivo === 'Otro' ? formData.otroMotivoText : formData.motivo,
                            diabetico: formData.esDiabetico,
                            anticuagulantes: formData.tomaAnticoagulantes,
                            nivel_dolor: formData.nivelDolor,
                            alergias: formData.alergias || "Ninguna",
                            medicamentos: formData.otrosMedicamentos || "Ninguno",
                            como_se_entero: formData.comoSeEntero,
                            tutor: isMinor ? `${formData.nombreTutor} (${formData.parentescoTutor})` : "N/A",
                            foto: imagePreview // SE ENVÍA AL CORREO
                        });
                    }

                    setSubmitted(true);
                } catch (err) { 
                    console.error(err); 
                    setErrorMsg("Error al enviar la cita. Inténtalo de nuevo."); 
                } finally { setLoading(false); }
            };

            if (submitted) return (
                <div className="min-h-screen flex items-center justify-center bg-slate-50 p-6 animate-in">
                    <div className="max-w-md w-full bg-white rounded-[3rem] shadow-2xl p-12 text-center border-t-8 border-teal-600">
                        <div className="w-20 h-20 bg-teal-50 rounded-full flex items-center justify-center mx-auto mb-6"><Icons.Check className="text-teal-600 w-10 h-10" /></div>
                        <h2 className="text-3xl font-black mb-4 text-slate-800 tracking-tighter">¡Cita Registrada!</h2>
                        <p className="text-slate-600 mb-10 leading-relaxed text-lg">Gracias <b>{formData.nombre}</b>. Hemos recibido tu solicitud correctamente.</p>
                        <button onClick={() => window.location.reload()} className="w-full bg-slate-900 text-white font-bold py-5 rounded-2xl shadow-lg">Regresar al inicio</button>
                    </div>
                </div>
            );

            if (view === 'admin') return (
                <div className="min-h-screen bg-slate-100 p-6 md:p-12 animate-in">
                    <div className="max-w-5xl mx-auto">
                        <header className="flex justify-between items-center mb-10">
                            <h1 className="text-4xl font-black text-slate-800 italic">Panel Brenda</h1>
                            <button onClick={() => setView('form')} className="bg-white px-6 py-3 rounded-2xl text-slate-600 font-bold shadow-sm">Ver Web</button>
                        </header>
                        <div className="grid gap-6">
                            {appointments.map(apt => (
                                <div key={apt.id} className="bg-white p-8 rounded-[2.5rem] shadow-sm border border-slate-200 flex justify-between gap-8 animate-in">
                                    <div className="flex-1">
                                        <h3 className="font-extrabold text-2xl text-slate-800">{apt.nombre} <span className="text-slate-400 font-normal text-lg">({apt.edad} años)</span></h3>
                                        <p className="text-teal-600 font-black mt-1 uppercase tracking-widest">{apt.fecha} • {apt.hora}</p>
                                        <div className="mt-4 flex flex-wrap gap-3 text-[10px] font-black uppercase text-slate-500">
                                            <span className="bg-slate-100 px-3 py-1 rounded-full">TEL: {apt.telefono}</span>
                                            {apt.tomaAnticoagulantes === 'si' && <span className="bg-orange-50 text-orange-600 px-3 py-1 rounded-full">Anticoagulantes</span>}
                                        </div>
                                    </div>
                                    <div className="flex gap-2 items-center">
                                        {apt.foto && <button onClick={() => window.open(apt.foto)} className="bg-slate-800 text-white p-4 rounded-2xl shadow-md"><Icons.Camera /></button>}
                                        <button onClick={async () => { if(confirm("¿Borrar?")) await window.fb.deleteDoc(window.fb.doc(window.fb.db, 'appointments', apt.id)) }} className="bg-red-50 text-red-500 p-4 rounded-2xl hover:bg-red-100 transition-all"><Icons.Trash /></button>
                                    </div>
                                </div>
                            ))}
                        </div>
                    </div>
                </div>
            );

            return (
                <div className="min-h-screen py-12 px-6 flex flex-col items-center selection:bg-teal-100">
                    <div className="w-full max-w-xl">
                        <div className="text-center mb-12">
                            <h1 className="text-7xl font-black tracking-tighter mb-2 italic" style={{color: brandColors.darkTeal}}>PieSano</h1>
                            <p className="text-slate-500 font-bold text-sm tracking-[0.3em] uppercase opacity-60">Podología Clínica</p>
                            <div className="flex justify-center mt-12 gap-3">
                                {[1, 2, 3].map(n => <div key={n} className="h-1.5 w-16 rounded-full transition-all duration-700 shadow-sm" style={{backgroundColor: step >= n ? brandColors.teal : '#e2e8f0'}} />)}
                            </div>
                        </div>

                        {errorMsg && (
                            <div className="bg-red-50 text-red-700 p-6 rounded-3xl mb-8 text-sm font-bold border-2 border-red-100 flex items-center gap-4 animate-in">
                                <Icons.Alert className="w-8 h-8 shrink-0" /> {errorMsg}
                            </div>
                        )}

                        <div className="bg-white rounded-[3.5rem] shadow-2xl p-10 md:p-14 border border-slate-100">
                            <form onSubmit={handleSubmit} className="space-y-10">
                                {step === 1 && (
                                    <div className="space-y-6 animate-in">
                                        <div className="font-black uppercase text-[10px] tracking-[0.2em] text-teal-600 flex items-center gap-2 mb-2"><Icons.User className="w-4 h-4" /> 01. Datos Personales</div>
                                        <input required type="text" name="nombre" value={formData.nombre} onChange={handleInputChange} placeholder="Nombre Completo" className="w-full px-6 py-5 rounded-[1.5rem] bg-slate-50 focus:bg-white border-2 border-transparent focus:border-emerald-100 outline-none transition-all font-medium text-lg shadow-inner" />
                                        <div className="grid grid-cols-2 gap-4">
                                            <input required type="number" name="edad" value={formData.edad} onChange={handleInputChange} placeholder="Edad" className="w-full px-6 py-5 rounded-[1.5rem] bg-slate-50 outline-none text-lg font-bold shadow-inner" />
                                            <select name="sexo" value={formData.sexo} onChange={handleInputChange} className="w-full px-6 py-5 rounded-[1.5rem] bg-slate-50 outline-none font-bold cursor-pointer shadow-inner"><option>Femenino</option><option>Masculino</option></select>
                                        </div>
                                        <input required type="tel" name="telefono" value={formData.telefono} onChange={handleInputChange} placeholder="WhatsApp (10 dígitos)" className="w-full px-6 py-5 rounded-[1.5rem] bg-slate-50 outline-none text-lg font-medium shadow-inner" />
                                        <input type="email" name="email" value={formData.email} onChange={handleInputChange} placeholder="Correo (Opcional)" className="w-full px-6 py-5 rounded-[1.5rem] bg-slate-50 outline-none shadow-inner" />
                                        {isMinor && (
                                            <div className="p-8 rounded-[2rem] border-4 border-dashed border-teal-100 bg-teal-50/10 space-y-6 animate-in">
                                                <div className="flex items-center gap-2 text-xs font-black text-teal-800 uppercase tracking-widest"><Icons.Shield className="w-4 h-4" /> Menor de Edad</div>
                                                <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                                    <input required type="text" name="nombreTutor" value={formData.nombreTutor} onChange={handleInputChange} placeholder="Nombre Tutor" className="w-full px-5 py-4 rounded-2xl bg-white border border-slate-200 outline-none" />
                                                    <select name="parentescoTutor" value={formData.parentescoTutor} onChange={handleInputChange} className="w-full px-5 py-4 rounded-2xl bg-white border border-slate-200 font-bold"><option>Madre</option><option>Padre</option><option>Tutor legal</option></select>
                                                </div>
                                                <label className="flex items-start gap-4 cursor-pointer"><input required type="checkbox" name="consentimientoTutor" checked={formData.consentimientoTutor} onChange={handleInputChange} className="mt-1 w-7 h-7 accent-teal-600 cursor-pointer rounded-lg" /><span className="text-[11px] font-black text-teal-900 leading-tight uppercase">Autorizo el tratamiento del menor.</span></label>
                                            </div>
                                        )}
                                        <button type="button" onClick={() => setStep(2)} disabled={!formData.nombre || !formData.edad || !formData.telefono || (isMinor && (!formData.nombreTutor || !formData.consentimientoTutor))} className="w-full bg-slate-900 text-white font-black py-6 rounded-[2rem] text-xl shadow-xl transition-all active:scale-[0.98] disabled:opacity-30">Siguiente Paso</button>
                                    </div>
                                )}

                                {step === 2 && (
                                    <div className="space-y-6 animate-in">
                                        <div className="font-black uppercase text-[10px] tracking-[0.2em] text-teal-600 flex items-center gap-2 mb-2"><Icons.Stethoscope className="w-4 h-4" /> 02. Perfil Clínico</div>
                                        <div className="space-y-6 text-slate-700">
                                            <div className="space-y-4"><p className="text-sm font-black uppercase text-center md:text-left">¿Tiene Diabetes?</p><div className="flex gap-4">{['si', 'no'].map(opt => <button key={opt} type="button" onClick={() => setFormData({...formData, esDiabetico: opt})} className={`flex-1 py-5 rounded-[1.5rem] border-2 font-black transition-all ${formData.esDiabetico === opt ? 'text-white border-transparent' : 'text-slate-400 bg-slate-50 border-slate-100'}`} style={{backgroundColor: formData.esDiabetico === opt ? brandColors.teal : ''}}>{opt.toUpperCase()}</button>)}</div></div>
                                            
                                            <div className="space-y-4"><p className="text-sm font-black uppercase text-center md:text-left">¿Toma Anticoagulantes?</p><div className="flex gap-4">{['si', 'no'].map(opt => <button key={opt} type="button" onClick={() => setFormData({...formData, tomaAnticoagulantes: opt})} className={`flex-1 py-5 rounded-[1.5rem] border-2 font-black transition-all ${formData.tomaAnticoagulantes === opt ? 'text-white border-transparent' : 'text-slate-400 bg-slate-50 border-slate-100'}`} style={{backgroundColor: formData.tomaAnticoagulantes === opt ? brandColors.teal : ''}}>{opt.toUpperCase()}</button>)}</div></div>
                                            
                                            <div className="space-y-4 pt-4"><p className="text-sm font-black uppercase flex justify-between tracking-wider">Dolor actual: <span className="bg-slate-100 px-4 py-1 rounded-full text-slate-900 font-black">{formData.nivelDolor}/10</span></p><input type="range" min="0" max="10" name="nivelDolor" value={formData.nivelDolor} onChange={handleInputChange} className="w-full h-3 bg-slate-100 rounded-full appearance-none cursor-pointer" /></div>
                                            <input type="text" name="alergias" value={formData.alergias} onChange={handleInputChange} placeholder="Alergias (Opcional)" className="w-full px-6 py-5 rounded-[1.5rem] bg-slate-50 border-2 border-transparent focus:border-emerald-100 outline-none font-medium shadow-inner" />
                                            <textarea name="otrosMedicamentos" value={formData.otrosMedicamentos} onChange={handleInputChange} placeholder="Medicamentos actuales" className="w-full px-6 py-5 rounded-[1.5rem] bg-slate-50 border-2 border-transparent focus:border-emerald-100 outline-none h-32 resize-none font-medium shadow-inner" />
                                        </div>
                                        <div className="flex gap-4">
                                            <button type="button" onClick={() => setStep(1)} className="flex-1 bg-slate-100 font-bold py-6 rounded-[2rem] text-slate-500 transition-all hover:bg-slate-200 flex items-center justify-center gap-2"><Icons.ChevronLeft className="w-5 h-5" /> Atrás</button>
                                            <button type="button" onClick={() => setStep(3)} className="flex-[2] text-white font-black py-6 rounded-[2rem] shadow-xl hover:brightness-110 active:scale-[0.98]" style={{backgroundColor: brandColors.darkTeal}}>Continuar</button>
                                        </div>
                                    </div>
                                )}

                                {step === 3 && (
                                    <div className="space-y-8 animate-in">
                                        <div className="font-black uppercase text-[10px] tracking-[0.2em] text-teal-600 flex items-center gap-2 mb-2"><Icons.Calendar className="w-4 h-4" /> 03. Agenda</div>
                                        <div className="space-y-6">
                                            <div className="space-y-3"><p className="text-xs font-black text-slate-400 uppercase tracking-widest pl-2">Servicio</p><select name="motivo" value={formData.motivo} onChange={handleInputChange} className="w-full px-6 py-5 rounded-[1.5rem] bg-slate-50 outline-none font-bold cursor-pointer shadow-inner"><option>Corte de uñas básico</option><option>Uña encarnada (Urgencia)</option><option>Retiro de callosidades</option><option>Verrugas plantares</option><option>Estudio para plantillas</option><option>Otro</option></select>{formData.motivo === 'Otro' && <input required type="text" name="otroMotivoText" value={formData.otroMotivoText} onChange={handleInputChange} placeholder="Especifique su motivo" className="w-full px-6 py-5 rounded-[1.2rem] bg-white border-4 border-emerald-50 outline-none animate-in font-bold shadow-sm" />}</div>
                                            <div className="grid grid-cols-2 gap-4"><input required type="date" name="fecha" value={formData.fecha} onChange={handleInputChange} className="w-full px-6 py-5 rounded-[1.5rem] bg-slate-50 outline-none font-bold shadow-inner" /><input required type="time" name="hora" value={formData.hora} onChange={handleInputChange} className="w-full px-6 py-5 rounded-[1.5rem] bg-slate-50 outline-none font-bold shadow-inner" /></div>
                                            
                                            {/* BOTÓN DE FOTO CON TEXTO PERSONALIZADO Y VALIDACIÓN */}
                                            <label className="cursor-pointer block border-4 border-dashed rounded-[3rem] p-10 text-center border-slate-200 bg-slate-50/20 hover:border-teal-200 transition-all group relative overflow-hidden shadow-inner">
                                                {imagePreview ? (
                                                    <div className="relative inline-block animate-in">
                                                        <img src={imagePreview} className="h-48 rounded-[2rem] shadow-2xl border-4 border-white object-cover" alt="Previsualización" />
                                                        <button type="button" onClick={(e) => { e.preventDefault(); setImagePreview(null); }} className="absolute -top-3 -right-3 bg-red-500 text-white p-2 rounded-full shadow-lg hover:bg-red-600 transition-colors"><Icons.Trash className="w-5 h-5"/></button>
                                                    </div>
                                                ) : (
                                                    <div className="flex flex-col items-center gap-4 py-4 opacity-40 group-hover:opacity-70 transition-opacity">
                                                        <div className="w-16 h-16 bg-white rounded-full flex items-center justify-center shadow-md">
                                                            <Icons.Camera className="w-8 h-8 text-slate-400" />
                                                        </div>
                                                        <p className="text-[10px] font-black uppercase tracking-widest text-center">Subir foto del área afectada o a tratar (Opcional)</p>
                                                    </div>
                                                )}
                                                <input type="file" accept="image/*" onChange={handleImageChange} className="hidden"/>
                                            </label>

                                            <select name="comoSeEntero" value={formData.comoSeEntero} onChange={handleInputChange} className="w-full px-6 py-5 rounded-[1.5rem] bg-slate-50 outline-none font-bold cursor-pointer shadow-inner"><option>Facebook</option><option>Instagram</option><option>Recomendación</option><option>Buscador de Google</option><option>Vi el local</option></select>
                                        </div>
                                        <div className="p-8 rounded-[2.5rem] bg-slate-50 border-2 border-slate-100 shadow-inner"><label className="flex items-start gap-5 cursor-pointer"><input required type="checkbox" name="aceptaTerminos" checked={formData.aceptaTerminos} onChange={handleInputChange} className="mt-1 w-7 h-7 accent-teal-600 cursor-pointer rounded-lg shadow-sm" /><span className="text-[11px] font-bold text-slate-500 uppercase leading-relaxed tracking-tighter">Acepto los términos y confidencialidad clínica.</span></label></div>
                                        <div className="flex gap-4 pt-4">
                                            <button type="button" onClick={() => setStep(2)} className="flex-1 bg-slate-100 font-bold py-6 rounded-[2rem] text-slate-500 transition-all hover:bg-slate-200 flex items-center justify-center gap-2"><Icons.ChevronLeft className="w-5 h-5" /> Atrás</button>
                                            <button type="submit" disabled={loading || !formData.aceptaTerminos || !formData.fecha || !formData.hora} className="flex-[2] text-white font-black py-6 rounded-[2rem] shadow-2xl shadow-teal-100 active:scale-95 transition-all disabled:opacity-50 text-xl flex items-center justify-center gap-2" style={{backgroundColor: brandColors.teal}}>
                                                {loading ? <Icons.Loader className="w-6 h-6" /> : 'Solicitar Cita'}
                                            </button>
                                        </div>
                                    </div>
                                )}
                            </form>
                        </div>
                        <button onClick={() => setView('admin')} className="mt-16 mx-auto block opacity-0 hover:opacity-40 text-[9px] font-black uppercase tracking-[0.5em] text-slate-400 transition-all">Acceso Staff</button>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
